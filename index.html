<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Rock Paper Scissors</h1>

    <div class="choices">
        <button class="choice" data-choice="Rock">🪨 Rock</button>
        <button class="choice" data-choice="Paper">📄 Paper</button>
        <button class="choice" data-choice="Scissors">✂️ Scissors</button>
    </div>

    <div class="result">
        <p><strong>Your Choice:</strong> <span id="playerChoice">-</span></p>
        <p><strong>Computer Choice:</strong> <span id="computerChoice">-</span></p>

        <h2 id="winner">Choose an option!</h2>
    </div>

    <div class="scoreboard">
        <div>
            <h3>You</h3>
            <p id="playerScore">0</p>
        </div>

        <div>
            <h3>Computer</h3>
            <p id="computerScore">0</p>
        </div>
    </div>

    <button id="reset">Reset Game</button>

</div>

<script src="script.js"></script>

</body>
</html>
